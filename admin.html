<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NyxFF Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo">NYX<span class="ff-text">FF</span> ADMIN</div>
            <nav class="admin-nav">
                <a href="#" class="admin-link active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#" class="admin-link"><i class="fas fa-gamepad"></i> Akun</a>
                <a href="#" class="admin-link"><i class="fas fa-chart-line"></i> Statistik</a>
                <a href="#" class="admin-link"><i class="fas fa-cog"></i> Pengaturan</a>
                <a href="index.html" class="admin-link"><i class="fas fa-arrow-left"></i> Ke Website</a>
            </nav>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <h1>Dashboard Admin</h1>
                <div class="admin-stats">
                    <div class="stat-card"><span>Total Akun</span><strong id="totalAkun">0</strong></div>
                    <div class="stat-card"><span>Terjual</span><strong id="totalTerjual">0</strong></div>
                    <div class="stat-card"><span>Pendapatan</span><strong id="totalPendapatan">Rp0</strong></div>
                </div>
            </header>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead><tr><th>Kode</th><th>Rank</th><th>Harga</th><th>Status</th><th>Aksi</th></tr></thead>
                    <tbody id="adminAccountList"></tbody>
                </table>
            </div>
            <div class="admin-form">
                <h3>Tambah/Edit Akun</h3>
                <form id="adminAccountForm">
                    <input type="text" id="adminKode" placeholder="Kode Akun" required>
                    <input type="text" id="adminRank" placeholder="Rank">
                    <input type="number" id="adminHarga" placeholder="Harga">
                    <input type="text" id="adminStatus" placeholder="Status">
                    <button type="submit" class="btn-primary">Simpan</button>
                </form>
            </div>
        </main>
    </div>
    <script src="js/accounts.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
