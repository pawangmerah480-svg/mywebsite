<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Search Ayat | Al-Qur'an Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Amiri+Quran&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="animated-bg">
    <div class="aurora"></div>
    <div class="moon"></div>
    <div class="geometric-overlay"></div>
  </div>

  <nav class="navbar glass">
    <div class="nav-container">
      <div class="logo"><i class="fas fa-quran"></i><span>Al-Qur'an</span></div>
      <div class="nav-actions">
        <button class="icon-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="icon-btn" id="backHome"><i class="fas fa-home"></i></button>
      </div>
    </div>
  </nav>

  <div class="ai-search-container">
    <div class="ai-header">
      <h1><i class="fas fa-robot"></i> AI Pencarian Ayat</h1>
      <p>Cari ayat berdasarkan topik: sabar, rezeki, ibu, surga, dan lainnya</p>
    </div>

    <div class="search-box glass">
      <i class="fas fa-search"></i>
      <input type="text" id="aiQuery" placeholder="Contoh: ayat tentang kesabaran" autocomplete="off">
      <button id="aiSearchBtn"><i class="fas fa-arrow-right"></i></button>
    </div>

    <div class="trending-searches">
      <span>🔥 Trending:</span>
      <button class="trend-chip">sabar</button>
      <button class="trend-chip">rezeki</button>
      <button class="trend-chip">ibu</button>
      <button class="trend-chip">surga</button>
      <button class="trend-chip">taubat</button>
      <button class="trend-chip">cinta</button>
    </div>

    <div class="search-history glass">
      <h3>📜 Riwayat Pencarian</h3>
      <div id="historyList"></div>
    </div>

    <div class="ai-results" id="aiResults"></div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) themeToggle.onclick = () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };
    document.getElementById('backHome').onclick = () => window.location.href = 'index.html';

    let ayatDatabase = [];
    let searchHistory = JSON.parse(localStorage.getItem('ai_search_history')) || [];

    function loadHistory() {
      const historyDiv = document.getElementById('historyList');
      if (searchHistory.length === 0) {
        historyDiv.innerHTML = '<p class="empty-state">Belum ada riwayat</p>';
        return;
      }
      historyDiv.innerHTML = searchHistory.slice(-5).reverse().map(q => `<button class="history-item">${q}</button>`).join('');
      document.querySelectorAll('.history-item').forEach(btn => {
        btn.onclick = () => {
          document.getElementById('aiQuery').value = btn.innerText;
          searchAyat();
        };
      });
    }

    async function loadAllAyatForAI() {
      if (ayatDatabase.length > 0) return;
      const surahs = await fetchAllSurah();
      for (let s of surahs.slice(0, 30)) { // batasi untuk performa
        const detail = await fetchSurahDetail(s.number);
        detail.verses.forEach(v => {
          ayatDatabase.push({
            surahName: detail.name.transliteration.id,
            surahNum: s.number,
            ayatNum: v.number.inSurah,
            arab: v.text.arab,
            latin: v.text.transliteration.en,
            translation: v.translation.id
          });
        });
      }
    }

    function searchAyatByTopic(query) {
      const keywords = {
        sabar: /sabar|patient|ketabahan/i,
        rezeki: /rezeki|rizki|makanan|harta|karunia/i,
        ibu: /ibu|mother|orang tua|parent/i,
        surga: /surga|jannah|syurga|paradise/i,
        taubat: /taubat|repent|ampun/i,
        cinta: /cinta|love|kasih/i
      };
      let matched = [];
      for (let [topic, regex] of Object.entries(keywords)) {
        if (regex.test(query)) {
          matched = ayatDatabase.filter(a => regex.test(a.translation) || regex.test(a.latin));
          break;
        }
      }
      if (matched.length === 0 && query.length > 2) {
        matched = ayatDatabase.filter(a => a.translation.toLowerCase().includes(query.toLowerCase()));
      }
      return matched.slice(0, 8);
    }

    async function searchAyat() {
      const query = document.getElementById('aiQuery').value.trim();
      if (!query) return;
      
      // Simpan riwayat
      if (!searchHistory.includes(query)) {
        searchHistory.push(query);
        if (searchHistory.length > 10) searchHistory.shift();
        localStorage.setItem('ai_search_history', JSON.stringify(searchHistory));
        loadHistory();
      }

      const container = document.getElementById('aiResults');
      container.innerHTML = '<div class="skeleton-loader"></div>';
      
      await loadAllAyatForAI();
      const results = searchAyatByTopic(query);
      
      setTimeout(() => {
        if (results.length === 0) {
          container.innerHTML = '<div class="empty-state glass">Tidak ditemukan ayat yang relevan. Coba kata kunci lain.</div>';
        } else {
          container.innerHTML = results.map(r => `
            <div class="result-card glass fade-up">
              <div class="result-header">${r.surahName} : Ayat ${r.ayatNum}</div>
              <div class="arabic">${r.arab.substring(0, 100)}…</div>
              <div class="latin">${r.latin.substring(0, 100)}…</div>
              <div class="translation">${r.translation.substring(0, 150)}…</div>
              <button class="btn-primary small read-ayat" data-surah="${r.surahNum}" data-ayat="${r.ayatNum}">Baca Ayat</button>
            </div>
          `).join('');
          document.querySelectorAll('.read-ayat').forEach(btn => {
            btn.onclick = () => window.location.href = `surah.html?surah=${btn.dataset.surah}#ayat-${btn.dataset.ayat}`;
          });
        }
      }, 500);
    }

    document.getElementById('aiSearchBtn').onclick = searchAyat;
    document.getElementById('aiQuery').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchAyat();
    });
    document.querySelectorAll('.trend-chip').forEach(chip => {
      chip.onclick = () => {
        document.getElementById('aiQuery').value = chip.innerText;
        searchAyat();
      };
    });

    loadHistory();
    loadAllAyatForAI();
  </script>
</body>
</html>
