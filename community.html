<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Komunitas | Al-Qur'an Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Amiri+Quran&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="animated-bg">
    <div class="aurora"></div>
    <div class="moon"></div>
    <div class="geometric-overlay"></div>
  </div>

  <nav class="navbar glass">
    <div class="nav-container">
      <div class="logo"><i class="fas fa-quran"></i><span>Al-Qur'an</span></div>
      <div class="nav-actions">
        <button class="icon-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="icon-btn" id="backHome"><i class="fas fa-home"></i></button>
      </div>
    </div>
  </nav>

  <div class="community-container">
    <div class="profile-header glass">
      <div class="avatar"><i class="fas fa-user-circle"></i></div>
      <div class="profile-info">
        <h3 id="username">Pengguna Quran</h3>
        <p id="userBio">💚 Pembaca Al-Qur'an</p>
        <div class="stats-badges">
          <span><i class="fas fa-bookmark"></i> <span id="userBookmarks">0</span></span>
          <span><i class="fas fa-eye"></i> <span id="userTotalRead">0</span> ayat</span>
          <span><i class="fas fa-fire"></i> <span id="userStreak">0</span> hari</span>
        </div>
        <button id="editProfileBtn" class="btn-secondary small">Edit Profil</button>
      </div>
    </div>

    <div class="trending-ayat glass">
      <h3>🔥 Trending Ayat Hari Ini</h3>
      <div id="trendingList">Memuat...</div>
    </div>

    <div class="community-feed glass">
      <h3>📢 Aktivitas Teman</h3>
      <div id="activityFeed"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    // Theme and back
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) themeToggle.onclick = () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };
    document.getElementById('backHome').onclick = () => window.location.href = 'index.html';

    // User data
    let user = JSON.parse(localStorage.getItem("quran_user")) || {
      username: "Pengguna Quran",
      bio: "💚 Pembaca Al-Qur'an",
      bookmarks: [],
      totalRead: 0,
      streak: 0,
      likedAyat: []
    };
    document.getElementById("username").innerText = user.username;
    document.getElementById("userBio").innerText = user.bio;
    document.getElementById("userBookmarks").innerText = (JSON.parse(localStorage.getItem("quran_bookmarks") || "[]")).length;
    document.getElementById("userTotalRead").innerText = user.totalRead || 0;
    document.getElementById("userStreak").innerText = user.streak || 0;

    document.getElementById("editProfileBtn").onclick = () => {
      const newName = prompt("Nama baru:", user.username);
      const newBio = prompt("Bio:", user.bio);
      if (newName) user.username = newName;
      if (newBio) user.bio = newBio;
      localStorage.setItem("quran_user", JSON.stringify(user));
      location.reload();
    };

    // Trending ayat
    let trending = JSON.parse(localStorage.getItem("trending_ayat")) || [];
    const trendingDiv = document.getElementById("trendingList");
    if (trending.length === 0) trendingDiv.innerHTML = "<p>Belum ada trending. Like ayat untuk memunculkannya.</p>";
    else {
      trendingDiv.innerHTML = trending.slice(0,5).map(t => `
        <div class="trend-item">Surah ${t.surah} Ayat ${t.ayat} - ❤️ ${t.likes} like</div>
      `).join("");
    }

    // Simulasi activity feed
    const feed = document.getElementById("activityFeed");
    feed.innerHTML = `
      <div class="activity-item">User1 menyelesaikan Juz 30</div>
      <div class="activity-item">User2 memberi like pada Surah Ar-Rahman</div>
      <div class="activity-item">User3 membaca 5 ayat hari ini</div>
    `;
  </script>
</body>
</html>
