<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Ucapan Ulang Tahun - Keluarga Tercinta</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header Chat -->
        <div class="chat-header glass-effect">
            <div class="header-left">
                <div class="group-icon">👨‍👩‍👧‍👦</div>
                <div class="group-info">
                    <div class="group-name">
                        Keluarga Tercinta
                        <span class="birthday-icon">🎂</span>
                    </div>
                    <div class="group-status">
                        <span class="status-dot"></span>
                        Online
                    </div>
                </div>
            </div>
            <div class="music-control">
                <button id="musicToggle" class="music-btn">🔊</button>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Pesan akan ditambahkan via JavaScript -->
        </div>

        <!-- Status Mengetik -->
        <div class="typing-status" id="typingStatus">
            <span class="typing-text">Mengetik</span>
            <span class="typing-dots">
                <span>.</span><span>.</span><span>.</span>
            </span>
        </div>

        <!-- Tombol Interaktif -->
        <div class="action-buttons">
            <button class="action-btn gift-btn" id="giftBtn">
                <span class="btn-icon">🎁</span>
                Buka Hadiah
            </button>
            <button class="action-btn celebrate-btn" id="celebrateBtn">
                <span class="btn-icon">🎉</span>
                Rayakan Lagi
            </button>
            <button class="action-btn memory-btn" id="memoryBtn">
                <span class="btn-icon">📸</span>
                Lihat Kenangan
            </button>
        </div>
    </div>

    <!-- Popup Hadiah -->
    <div class="popup-overlay" id="giftPopup">
        <div class="popup-content glass-effect">
            <div class="popup-header">
                <span class="popup-icon">🎁</span>
                <h3>Kejutan Spesial!</h3>
            </div>
            <p>Semoga tahun ini penuh keberuntungan! ✨</p>
            <button class="popup-close" id="closeGiftPopup">Tutup</button>
        </div>
    </div>

    <!-- Popup Gallery -->
    <div class="popup-overlay" id="galleryPopup">
        <div class="popup-content gallery-content glass-effect">
            <div class="popup-header">
                <span class="popup-icon">📸</span>
                <h3>Kenangan Keluarga</h3>
            </div>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <div class="gallery-icon">👨‍👩‍👧</div>
                    <span>Liburan 2023</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-icon">🎂</div>
                    <span>Ulang Tahun 2022</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-icon">🏖️</div>
                    <span>Liburan Pantai</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-icon">🏠</div>
                    <span>Kumpul Keluarga</span>
                </div>
            </div>
            <button class="popup-close" id="closeGalleryPopup">Tutup</button>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="birthdayMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Canvas untuk confetti -->
    <canvas id="confettiCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
