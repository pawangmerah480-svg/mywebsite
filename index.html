<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🐟 Crypto Fishing Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- AREA ATAS: Animasi Air & Karakter -->
        <div class="top-area">
            <div class="fisherman">👨‍🌾</div>
            <div class="water-scene">
                <div class="water-surface"></div>
                <div class="bubbles"></div>
                <div class="fish-swarm" id="fishSwarm"></div>
                <div class="fishing-line" id="fishingLine"></div>
                <div class="fishing-hook" id="fishingHook">🎣</div>
                <div class="fish-animation" id="fishAnimation">🐟</div>
                <div class="splash-effect" id="splash"></div>
                <div class="ripple" id="ripple"></div>
            </div>
        </div>

        <!-- AREA TENGAH: Status dan Informasi -->
        <div class="middle-area">
            <div class="resource-bar">
                <div class="resource-item"><span>💰</span> <span id="coinAmount">250</span></div>
                <div class="resource-item"><span>💎</span> <span id="gemAmount">5</span></div>
                <div class="resource-item"><span>🎣</span> <span id="playerLevel">7</span></div>
            </div>
            <div id="fishingStatus" class="fishing-status"></div>
            <div class="strength-bar-container" id="strengthBarContainer" style="display:none;">
                <div class="strength-bar-fill" id="strengthBarFill"></div>
            </div>
            <div id="fishingResult" class="fishing-result"></div>
        </div>

        <!-- AREA BAWAH: Control Panel -->
        <div class="bottom-area">
            <div class="control-panel">
                <button class="action-btn cast-btn" id="castButton">🎣 Cast</button>
                <button class="action-btn reel-btn" id="reelButton" style="display:none;">🎣 Tarik!</button>
                <button class="icon-btn" data-view="aquarium">🐠</button>
                <button class="icon-btn" data-view="market">💱</button>
                <button class="icon-btn" data-view="missions">🎯</button>
                <button class="icon-btn" data-view="pets">🐟</button>
                <button class="icon-btn" data-view="settings">⚙️</button>
            </div>
            <!-- Panel tambahan untuk map dan upgrade -->
            <div class="extra-panel">
                <select id="mapSelect" class="map-select">
                    <option value="River Market">🌊 River</option>
                    <option value="Forex Ocean">💱 Forex</option>
                    <option value="Crypto Sea" selected>🌊 Crypto</option>
                    <option value="Whale Abyss">🐋 Abyss</option>
                    <option value="Mythic Trench">🌈 Trench</option>
                </select>
                <div class="upgrade-icons">
                    <button class="upgrade-icon" data-upgrade="rod" title="Rod">🎣 <span id="rodLevel">1</span></button>
                    <button class="upgrade-icon" data-upgrade="bait" title="Bait">🪱 <span id="baitLevel">1</span></button>
                    <button class="upgrade-icon" data-upgrade="net" title="Net">🥅 <span id="netLevel">1</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Container untuk Aquarium, Market, dll (popup / overlay) -->
    <div id="viewContainer" class="view-container hidden">
        <div class="view-header">
            <h2 id="viewTitle">Aquarium</h2>
            <button class="close-view">✖</button>
        </div>
        <div class="view-content" id="viewContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
