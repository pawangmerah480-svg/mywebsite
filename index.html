<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>2D Character Movement</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <h1>🎮 2D Character Movement</h1>
    <p class="subtitle">Keyboard · Touch · Smooth · Bounded</p>
  </header>

  <!-- ── MAIN LAYOUT ── -->
  <main class="main">

    <!-- GAME AREA -->
    <div class="game-wrapper">
      <canvas id="gameCanvas"></canvas>

      <!-- HUD overlay -->
      <div class="hud">
        <div class="hud-item" id="hud-pos">📍 X: 0 · Y: 0</div>
        <div class="hud-item" id="hud-speed">⚡ 0 px/s</div>
        <div class="hud-item" id="hud-dir">🧭 Idle</div>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <aside class="panel">
      <div class="panel-card">
        <h2>⌨️ Keyboard</h2>
        <div class="key-visual">
          <div class="key-row"><kbd class="key" id="kw">W</kbd></div>
          <div class="key-row">
            <kbd class="key" id="ka">A</kbd>
            <kbd class="key" id="ks">S</kbd>
            <kbd class="key" id="kd">D</kbd>
          </div>
          <div class="key-row"><kbd class="key" id="ku">↑</kbd></div>
          <div class="key-row">
            <kbd class="key" id="kl">←</kbd>
            <kbd class="key" id="kdn">↓</kbd>
            <kbd class="key" id="kr">→</kbd>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <h2>⚙️ Controls</h2>
        <label class="slider-label">
          <span>Speed</span>
          <span id="speed-val" class="val-badge">4</span>
        </label>
        <input type="range" id="speed-slider" min="1" max="12" value="4" class="slider" />

        <label class="slider-label" style="margin-top:12px">
          <span>Player Size</span>
          <span id="size-val" class="val-badge">28</span>
        </label>
        <input type="range" id="size-slider" min="12" max="60" value="28" class="slider" />

        <label class="slider-label" style="margin-top:12px">
          <span>Skin</span>
        </label>
        <div class="skin-picker" id="skin-picker"></div>

        <button class="btn-reset" id="btn-reset">🔄 Reset Posisi</button>
      </div>

      <div class="panel-card stats-card">
        <h2>📊 Stats</h2>
        <div class="stat-row"><span>Jarak Tempuh</span><span id="stat-dist">0 px</span></div>
        <div class="stat-row"><span>Waktu Main</span><span id="stat-time">0s</span></div>
        <div class="stat-row"><span>Gerak Diagonal</span><span id="stat-diag">0×</span></div>
      </div>
    </aside>
  </main>

  <!-- ── MOBILE D-PAD ── -->
  <div class="dpad-wrap" id="dpad">
    <div class="dpad-grid">
      <!-- Top row -->
      <div></div>
      <button class="dpad-btn dpad-up"    id="btn-up"   aria-label="Up">
        <span class="dpad-arrow">▲</span>
      </button>
      <div></div>
      <!-- Middle row -->
      <button class="dpad-btn dpad-left"  id="btn-left" aria-label="Left">
        <span class="dpad-arrow">◀</span>
      </button>
      <div class="dpad-center">●</div>
      <button class="dpad-btn dpad-right" id="btn-right" aria-label="Right">
        <span class="dpad-arrow">▶</span>
      </button>
      <!-- Bottom row -->
      <div></div>
      <button class="dpad-btn dpad-down"  id="btn-down" aria-label="Down">
        <span class="dpad-arrow">▼</span>
      </button>
      <div></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
