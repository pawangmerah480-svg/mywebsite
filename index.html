<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keluarga Tercinta 🎂 - Ucapan Ulang Tahun</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header Chat -->
        <div class="chat-header">
            <div class="header-content">
                <div class="group-avatar">👨‍👩‍👧‍👦</div>
                <div class="group-details">
                    <div class="group-name">
                        Keluarga Tercinta
                        <span class="birthday-emoji">🎂</span>
                    </div>
                    <div class="group-status">
                        <span class="status-indicator"></span>
                        Online
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Messages Container -->
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be inserted here -->
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <span class="typing-text">Mengetik</span>
            <div class="typing-dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn gift-btn" id="giftBtn">
                <span class="btn-icon">🎁</span>
                Buka Hadiah
            </button>
            <button class="action-btn celebrate-btn" id="celebrateBtn">
                <span class="btn-icon">🎉</span>
                Rayakan Lagi
            </button>
            <button class="action-btn memory-btn" id="memoryBtn">
                <span class="btn-icon">📷</span>
                Lihat Kenangan
            </button>
        </div>
    </div>

    <!-- Popup Hadiah -->
    <div class="popup-overlay" id="giftPopup">
        <div class="popup-content">
            <div class="popup-header">
                <span class="popup-icon">🎁</span>
                <h3>Kejutan Spesial!</h3>
            </div>
            <p class="popup-message">Kejutan kecil untukmu! Semoga tahun ini penuh keberuntungan ✨</p>
            <button class="popup-close" id="closeGiftPopup">Tutup</button>
        </div>
    </div>

    <!-- Popup Gallery -->
    <div class="popup-overlay" id="galleryPopup">
        <div class="popup-content gallery-content">
            <div class="popup-header">
                <span class="popup-icon">📷</span>
                <h3>Gallery Kenangan</h3>
            </div>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <div class="gallery-image">👨‍👩‍👧‍👦</div>
                    <span>Keluarga 2023</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image">🎂</div>
                    <span>Ulang Tahun ke-17</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image">🏖️</div>
                    <span>Liburan Pantai</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image">🏠</div>
                    <span>Kumpul Keluarga</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image">🎉</div>
                    <span>Tahun Baru</span>
                </div>
                <div class="gallery-item">
                    <div class="gallery-image">📸</div>
                    <span>Foto Bersama</span>
                </div>
            </div>
            <button class="popup-close" id="closeGalleryPopup">Tutup</button>
        </div>
    </div>

    <!-- Canvas untuk Confetti -->
    <canvas id="confettiCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
