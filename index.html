<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🐟 Crypto Fishing Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- header with resources -->
        <div class="resources">
            <div class="resource-card"><span>💰 Coin</span> <span id="coinAmount">0</span></div>
            <div class="resource-card"><span>💎 Gem</span> <span id="gemAmount">5</span></div>
            <div class="resource-card"><span>🎣 Level</span> <span id="playerLevel">1</span></div>
        </div>

        <!-- main navigation menu -->
        <div class="nav-menu">
            <button class="nav-btn active" data-view="fishing">🎣 Fishing</button>
            <button class="nav-btn" data-view="aquarium">🐠 Aquarium</button>
            <button class="nav-btn" data-view="market">💱 Market</button>
            <button class="nav-btn" data-view="missions">🎯 Missions</button>
            <button class="nav-btn" data-view="pets">🐟 Pets</button>
            <button class="nav-btn" data-view="settings">⚙️ Settings</button>
        </div>

        <!-- dynamic content panel -->
        <div id="viewContainer" class="view-container">
            <!-- fishing view (default) -->
            <div class="view fishing-view active-view">
                <div class="map-selector">
                    <label for="mapSelect">🗺️ Map:</label>
                    <select id="mapSelect">
                        <option value="River Market">🌊 River Market</option>
                        <option value="Forex Ocean">💱 Forex Ocean</option>
                        <option value="Crypto Sea" selected>🌊 Crypto Sea</option>
                        <option value="Whale Abyss">🐋 Whale Abyss</option>
                        <option value="Mythic Trench">🌈 Mythic Trench</option>
                    </select>
                </div>
                <div class="rod-info">🎣 Rod: <span id="currentRod">Basic Rod</span> (0% bonus)</div>
                <div class="pet-info">🐟 Active Pet: <span id="currentPet">None</span></div>
                
                <!-- Fishing area with two-step mechanism -->
                <div class="fishing-area">
                    <button id="castButton" class="cast-btn">🎣 PANCING</button>
                    <button id="reelButton" class="reel-btn" style="display: none;">🎣 TARIK!</button>
                    <div id="fishingStatus" class="fishing-status"></div>
                    <div id="fishingResult" class="fishing-result"></div>
                </div>

                <div class="upgrade-section">
                    <h3>⬆️ Upgrades</h3>
                    <div class="upgrade-grid">
                        <button class="upgrade-btn" data-upgrade="rod">Rod (lvl <span id="rodLevel">1</span>) - 100💰</button>
                        <button class="upgrade-btn" data-upgrade="bait">Bait (lvl <span id="baitLevel">1</span>) - 80💰</button>
                        <button class="upgrade-btn" data-upgrade="net">Net (lvl <span id="netLevel">1</span>) - 120💰</button>
                    </div>
                </div>
            </div>

            <!-- aquarium view (hidden by default) -->
            <div class="view aquarium-view">
                <h2>🐠 My Aquarium</h2>
                <div id="inventoryList" class="inventory-grid"></div>
            </div>

            <!-- market view -->
            <div class="view market-view">
                <h2>💱 Trading Market</h2>
                <div class="market-grid" id="marketInventory"></div>
                <p class="small-hint">Click fish above to sell (70% value)</p>
            </div>

            <!-- missions view -->
            <div class="view missions-view">
                <h2>🎯 Daily Missions</h2>
                <div id="missionList" class="mission-list"></div>
            </div>

            <!-- pets view -->
            <div class="view pets-view">
                <h2>🐟 Pet Collection</h2>
                <div class="pets-grid" id="petsCollection"></div>
                <p class="small-hint">Pets give passive bonuses when equipped</p>
                <select id="equipPetSelect">
                    <option value="none">None (no pet)</option>
                </select>
                <button id="equipPetBtn">Equip</button>
            </div>

            <!-- settings view -->
            <div class="view settings-view">
                <h2>⚙️ Settings</h2>
                <div class="setting-item">
                    <span>🔊 Sound</span>
                    <button id="toggleSound">On</button>
                </div>
                <div class="setting-item">
                    <span>🎵 Music</span>
                    <button id="toggleMusic">On</button>
                </div>
                <div class="setting-item">
                    <span>🔄 Reset Progress</span>
                    <button id="resetProgress" class="danger-btn">Reset</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
