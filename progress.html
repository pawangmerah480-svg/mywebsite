<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Progress Khatam | Al-Qur'an Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Amiri+Quran&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="animated-bg">
    <div class="aurora"></div>
    <div class="moon"></div>
    <div class="geometric-overlay"></div>
  </div>

  <nav class="navbar glass">
    <div class="nav-container">
      <div class="logo"><i class="fas fa-quran"></i><span>Al-Qur'an</span></div>
      <div class="nav-actions">
        <button class="icon-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="icon-btn" id="backHome"><i class="fas fa-home"></i></button>
      </div>
    </div>
  </nav>

  <div class="progress-dashboard">
    <div class="section-header">
      <h2><i class="fas fa-chart-line"></i> Progress Khatam & Streak</h2>
      <p class="subtitle">Pantau perjalanan membaca Al-Qur'an Anda</p>
    </div>

    <div class="stats-glass glass">
      <div class="circular-progress">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/>
          <circle id="progressCircle" cx="60" cy="60" r="54" fill="none" stroke="var(--emerald)" stroke-width="10" stroke-dasharray="339.292" stroke-dashoffset="339.292" stroke-linecap="round" transform="rotate(-90 60 60)"/>
        </svg>
        <div class="progress-percent" id="khatamPercent">0%</div>
      </div>
      <div class="stats-row">
        <div class="stat-item glass"><span>📖 Ayat Dibaca</span><span id="totalAyatRead">0</span></div>
        <div class="stat-item glass"><span>📚 Surah Selesai</span><span id="totalSurahDone">0</span></div>
        <div class="stat-item glass"><span>🔥 Streak Hari</span><span id="streakDays">0</span></div>
        <div class="stat-item glass"><span>⭐ Total XP</span><span id="totalXP">0</span></div>
      </div>
    </div>

    <div class="achievements-section glass">
      <h3><i class="fas fa-medal"></i> Pencapaian & Badge</h3>
      <div class="badges-list" id="badgesList"></div>
    </div>

    <div class="motivation-card glass">
      <i class="fas fa-quote-right"></i>
      <p id="motivationQuote">"Sebaik-baik kalian adalah yang mempelajari Al-Qur'an dan mengajarkannya." - HR. Bukhari</p>
    </div>

    <div class="progress-chart glass">
      <h3>📊 Statistik Bacaan</h3>
      <canvas id="readingChart" width="400" height="200" style="max-width:100%; height:auto; background:rgba(0,0,0,0.3); border-radius:20px;"></canvas>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    // Theme & back
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) themeToggle.onclick = () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };
    document.getElementById('backHome').onclick = () => window.location.href = 'index.html';

    // Load data
    let progress = JSON.parse(localStorage.getItem('quran_progress')) || {
      totalAyat: 0,
      surahCompleted: [],
      streak: 0,
      lastReadDate: null,
      xp: 0,
      dailyReadHistory: []
    };

    const totalAyatQuran = 6236;

    function updateProgressDisplay() {
      const percent = (progress.totalAyat / totalAyatQuran) * 100;
      document.getElementById('khatamPercent').innerText = Math.floor(percent) + '%';
      document.getElementById('totalAyatRead').innerText = progress.totalAyat.toLocaleString();
      document.getElementById('totalSurahDone').innerText = progress.surahCompleted.length;
      document.getElementById('streakDays').innerText = progress.streak;
      document.getElementById('totalXP').innerText = progress.xp;

      const circumference = 339.292;
      const offset = circumference - (percent / 100) * circumference;
      const circle = document.getElementById('progressCircle');
      circle.style.strokeDashoffset = offset;

      // Update badges
      const badges = [];
      if (progress.totalAyat >= 100) badges.push({ name: '🏅 Pemula', desc: 'Baca 100 ayat' });
      if (progress.totalAyat >= 500) badges.push({ name: '📖 Hafiz Muda', desc: 'Baca 500 ayat' });
      if (progress.totalAyat >= 1000) badges.push({ name: '🌟 Alim', desc: 'Baca 1000 ayat' });
      if (progress.totalAyat >= 5000) badges.push({ name: '💎 Hafiz', desc: 'Baca 5000 ayat' });
      if (progress.streak >= 7) badges.push({ name: '🔥 Konsisten 7 Hari', desc: 'Streak 7 hari' });
      if (progress.streak >= 30) badges.push({ name: '⭐ Istiqomah', desc: 'Streak 30 hari' });
      if (progress.surahCompleted.length >= 30) badges.push({ name: '📚 Hafiz Juz', desc: 'Selesaikan 30 surah' });

      const badgesDiv = document.getElementById('badgesList');
      if (badges.length === 0) badgesDiv.innerHTML = '<p class="empty-state">Belum ada badge. Teruslah membaca!</p>';
      else {
        badgesDiv.innerHTML = badges.map(b => `
          <div class="badge-item glass">
            <span class="badge-icon">${b.name.split(' ')[0]}</span>
            <div><strong>${b.name}</strong><br><small>${b.desc}</small></div>
          </div>
        `).join('');
      }

      // Motivasi random
      const quotes = [
        "“Dan bacalah Al-Qur’an itu dengan perlahan-lahan.” (QS. Al-Muzzammil: 4)",
        "“Sesungguhnya Al-Qur’an ini memberikan petunjuk ke jalan yang paling lurus.” (QS. Al-Isra: 9)",
        "“Orang yang membaca Al-Qur’an dan mahir membacanya, kelak bersama para malaikat yang mulia.” (HR. Bukhari)",
        "“Bacalah Al-Qur’an, karena ia akan datang pada hari kiamat sebagai pemberi syafaat.” (HR. Muslim)"
      ];
      document.getElementById('motivationQuote').innerHTML = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
    }

    // Chart sederhana (menggunakan Canvas API)
    function drawChart() {
      const canvas = document.getElementById('readingChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const history = progress.dailyReadHistory || [];
      const days = history.slice(-7).map(h => h.day);
      const counts = history.slice(-7).map(h => h.ayat);
      canvas.width = 400;
      canvas.height = 200;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (days.length === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '12px Poppins';
        ctx.fillText('Belum ada data bacaan', 140, 100);
        return;
      }
      const maxCount = Math.max(...counts, 10);
      const barWidth = canvas.width / days.length - 8;
      for (let i = 0; i < days.length; i++) {
        const height = (counts[i] / maxCount) * 150;
        const x = i * (barWidth + 8) + 10;
        const y = canvas.height - height - 20;
        ctx.fillStyle = '#10b981';
        ctx.fillRect(x, y, barWidth, height);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Poppins';
        ctx.fillText(days[i], x, canvas.height - 5);
      }
    }

    updateProgressDisplay();
    drawChart();

    // Simulasi update progress (bisa dipanggil dari halaman lain)
    window.updateReadingProgress = (ayatCount, surahId) => {
      progress.totalAyat += ayatCount;
      if (!progress.surahCompleted.includes(surahId)) progress.surahCompleted.push(surahId);
      progress.xp += ayatCount;
      const today = new Date().toISOString().split('T')[0];
      const existing = progress.dailyReadHistory.find(h => h.day === today);
      if (existing) existing.ayat += ayatCount;
      else progress.dailyReadHistory.push({ day: today, ayat: ayatCount });
      // Update streak
      const lastDate = progress.lastReadDate;
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split('T')[0];
      if (lastDate === yesterdayStr) progress.streak++;
      else if (lastDate !== today) progress.streak = 1;
      progress.lastReadDate = today;
      localStorage.setItem('quran_progress', JSON.stringify(progress));
      updateProgressDisplay();
      drawChart();
      showNotification(`+${ayatCount} ayat dibaca! XP +${ayatCount}`);
    };
  </script>
</body>
</html>
