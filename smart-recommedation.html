<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smart Recommendation | Al-Qur'an Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Amiri+Quran&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="animated-bg">
    <div class="aurora"></div>
    <div class="moon"></div>
    <div class="geometric-overlay"></div>
  </div>

  <nav class="navbar glass">
    <div class="nav-container">
      <div class="logo"><i class="fas fa-quran"></i><span>Al-Qur'an</span></div>
      <div class="nav-actions">
        <button class="icon-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="icon-btn" id="backHome"><i class="fas fa-home"></i></button>
      </div>
    </div>
  </nav>

  <div class="recommendation-container">
    <h2><i class="fas fa-brain"></i> Rekomendasi Ayat Pintar</h2>
    <div class="mood-buttons">
      <button class="mood-btn" data-mood="sedih">😢 Sedih</button>
      <button class="mood-btn" data-mood="semangat">⚡ Semangat</button>
      <button class="mood-btn" data-mood="sabar">🧘 Sabar</button>
      <button class="mood-btn" data-mood="rezeki">💰 Rezeki</button>
      <button class="mood-btn" data-mood="belajar">📖 Belajar</button>
      <button class="mood-btn" data-mood="tidur">🌙 Sebelum Tidur</button>
    </div>
    <div class="daily-ayat glass">
      <h3>🌿 Ayat Hari Ini</h3>
      <div id="dailyAyat">Memuat...</div>
    </div>
    <div class="recommendation-results" id="recResults"></div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) themeToggle.onclick = () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };
    document.getElementById('backHome').onclick = () => window.location.href = 'index.html';

    const moodKeywords = {
      sedih: ["sabar", "rahmat", "hibur", "janji", "taubat"],
      semangat: ["jihad", "pahala", "surga", "kekuatan", "yakin"],
      sabar: ["sabar", "shalat", "istigfar", "ridha"],
      rezeki: ["rezeki", "berkah", "makan", "harta", "karunia"],
      belajar: ["ilmu", "hikmah", "pikir", "tadabbur"],
      tidur: ["malam", "tidur", "ayat kursi", "doa"]
    };
    let allAyat = [];

    async function loadAllAyat() {
      const surahs = await fetchAllSurah();
      for (let s of surahs.slice(0, 20)) { // batasi untuk performa
        const detail = await fetchSurahDetail(s.number);
        detail.verses.forEach(v => {
          allAyat.push({
            surah: detail.name.transliteration.id,
            surahNum: s.number,
            ayat: v.number.inSurah,
            arab: v.text.arab,
            latin: v.text.transliteration.en,
            translation: v.translation.id
          });
        });
      }
      setDailyAyat();
    }

    function getAyatByMood(mood) {
      const keywords = moodKeywords[mood] || ["rahmat"];
      let matched = allAyat.filter(a => keywords.some(k => a.translation.toLowerCase().includes(k)));
      if (matched.length === 0) matched = allAyat.slice(0, 4);
      return matched.slice(0, 4);
    }

    function displayRecommendations(ayats) {
      const container = document.getElementById("recResults");
      container.innerHTML = ayats.map(a => `
        <div class="rec-card glass fade-up">
          <div class="rec-header">${a.surah} : Ayat ${a.ayat}</div>
          <div class="arabic">${a.arab.substring(0, 100)}…</div>
          <div class="translation">${a.translation.substring(0, 120)}…</div>
          <button class="btn-primary small read-rec" data-surah="${a.surahNum}" data-ayat="${a.ayat}">Baca Ayat</button>
        </div>
      `).join("");
      document.querySelectorAll(".read-rec").forEach(btn => {
        btn.onclick = () => window.location.href = `surah.html?surah=${btn.dataset.surah}#ayat-${btn.dataset.ayat}`;
      });
    }

    function setDailyAyat() {
      const random = allAyat[Math.floor(Math.random() * allAyat.length)];
      document.getElementById("dailyAyat").innerHTML = `
        <div class="daily-card glass">
          <div class="arabic">${random.arab.substring(0, 80)}…</div>
          <div><strong>${random.surah}</strong> : ${random.ayat}</div>
          <button class="btn-primary small" onclick="location.href='surah.html?surah=${random.surahNum}#ayat-${random.ayat}'">Baca</button>
        </div>
      `;
    }

    document.querySelectorAll(".mood-btn").forEach(btn => {
      btn.onclick = () => {
        const mood = btn.dataset.mood;
        const recs = getAyatByMood(mood);
        displayRecommendations(recs);
      };
    });

    loadAllAyat();
  </script>
</body>
</html>
