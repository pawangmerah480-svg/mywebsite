<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#10b981">
  <title>Baca Surah | Al-Qur'an Premium 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Amiri+Quran&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="aurora"></div>
    <div class="moon"></div>
    <div class="geometric-overlay"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar glass" id="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fas fa-quran"></i>
        <span>Al-Qur'an</span>
      </div>
      <div class="nav-actions">
        <button class="icon-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="icon-btn" id="focusModeToggle"><i class="fas fa-expand"></i></button>
        <button class="icon-btn" id="backHome"><i class="fas fa-home"></i></button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="surah-detail-container" id="surahDetailContainer">
    <div class="surah-header glass" id="surahHeader">
      <div class="surah-header-content">
        <h1 id="surahName">Loading...</h1>
        <div class="surah-meta">
          <span id="surahType"></span> • <span id="surahAyatCount"></span> Ayat
        </div>
      </div>
      <div class="audio-controls">
        <select id="qoriSelect" class="qori-select glass">
          <option value="01">Mishari Rashid</option>
          <option value="02">Abdul Rahman Al-Sudais</option>
        </select>
        <button id="playFullSurah" class="audio-btn"><i class="fas fa-play"></i> Putar Murottal</button>
      </div>
    </div>

    <!-- Tajwid Legend -->
    <div class="tajwid-legend" id="tajwidLegend" style="display: none;">
      <div class="legend-item"><span style="background:#2dd4bf;"></span> Ikhfa</div>
      <div class="legend-item"><span style="background:#facc15;"></span> Idgham</div>
      <div class="legend-item"><span style="background:#a78bfa;"></span> Iqlab</div>
      <div class="legend-item"><span style="background:#34d399;"></span> Mad</div>
      <div class="legend-item"><span style="background:#f97316;"></span> Ghunnah</div>
    </div>

    <!-- Daftar Ayat -->
    <div class="ayat-list" id="ayatList"></div>
  </main>

  <!-- Floating Audio Player (sama seperti index) -->
  <div class="floating-player" id="floatingPlayer" style="display: none;">
    <div class="player-card glass">
      <div class="player-left">
        <div class="equalizer"><span></span><span></span><span></span></div>
        <div class="player-info">
          <div class="player-surah-name" id="playerSurahNameDetail"></div>
          <div class="player-ayat" id="playerAyatNumberDetail"></div>
        </div>
      </div>
      <div class="player-controls">
        <button class="player-btn" id="repeatBtnDetail"><i class="fas fa-redo-alt"></i></button>
        <button class="player-btn" id="prevBtnDetail"><i class="fas fa-backward-step"></i></button>
        <button class="player-btn play-pause" id="playPauseBtnDetail"><i class="fas fa-play"></i></button>
        <button class="player-btn" id="nextBtnDetail"><i class="fas fa-forward-step"></i></button>
        <button class="player-btn" id="repeatSurahBtnDetail"><i class="fas fa-repeat"></i></button>
        <button class="player-btn" id="closePlayerBtnDetail"><i class="fas fa-times"></i></button>
      </div>
      <div class="player-progress-container">
        <span class="current-time" id="currentTimeDetail">00:00</span>
        <div class="player-progress"><div class="progress-bar" id="progressBarFillDetail"></div></div>
        <span class="duration" id="durationDetail">00:00</span>
      </div>
    </div>
  </div>

  <!-- Modal Tafsir -->
  <div class="modal" id="tafsirModal">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3><i class="fas fa-book-open"></i> Tafsir Singkat</h3>
        <button class="close-modal tafsir-close"><i class="fas fa-times"></i></button>
      </div>
      <div id="tafsirContent"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="tafsir-ai.js"></script>
  <script src="focus-mode.js"></script>
  <script src="theme.js"></script>
  <script src="animated-bg.js"></script>
  <script src="script.js"></script>
  <script>
    // Load surah detail ketika halaman siap
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const surahId = params.get("surah");
      if (!surahId) {
        window.location.href = "index.html";
        return;
      }
      
      // Fungsi load detail surah (didefinisikan di sini karena spesifik)
      const data = await fetchSurahDetail(surahId);
      document.getElementById("surahName").innerHTML = `${data.name.transliteration.id} <span style="font-size:1rem;">(${data.name.short})</span>`;
      document.getElementById("surahType").innerText = data.revelation.text;
      document.getElementById("surahAyatCount").innerText = data.numberOfVerses;
      
      const container = document.getElementById("ayatList");
      container.innerHTML = "";
      const ayatAudioList = [];
      
      data.verses.forEach((ayat, idx) => {
        const card = document.createElement("div");
        card.className = "ayat-card fade-up";
        card.id = `ayat-${ayat.number.inSurah}`;
        card.innerHTML = `
          <div class="ayat-number">Ayat ${ayat.number.inSurah}</div>
          <div class="arabic">${ayat.text.arab}</div>
          <div class="latin">${ayat.text.transliteration.en}</div>
          <div class="translation">${ayat.translation.id}</div>
          <div class="action-buttons">
            <button class="bookmark-ayat" data-surah="${surahId}" data-ayat="${ayat.number.inSurah}" data-arab="${ayat.text.arab.replace(/"/g, '&quot;')}" data-trans="${ayat.translation.id.replace(/"/g, '&quot;')}" data-surahname="${data.name.transliteration.id}"><i class="fas fa-bookmark"></i> Bookmark</button>
            <button class="play-ayat" data-audio="${ayat.audio?.url || ''}" data-nomor="${ayat.number.inSurah}"><i class="fas fa-play"></i> Putar</button>
            <button class="copy-ayat"><i class="fas fa-copy"></i> Copy</button>
            <button class="tafsir-ayat" data-surah="${surahId}" data-ayat="${ayat.number.inSurah}"><i class="fas fa-book-open"></i> Tafsir</button>
          </div>
        `;
        container.appendChild(card);
        if (ayat.audio && ayat.audio.url) {
          ayatAudioList.push({ audio: ayat.audio.url, nomorAyat: ayat.number.inSurah });
        }
      });
      
      // Attach event listeners
      attachAyatActions(surahId, data.name.transliteration.id, ayatAudioList);
      
      // Scroll to last read if hash exists
      const hash = window.location.hash;
      if (hash && hash.includes("ayat-")) {
        const el = document.getElementById(hash.substring(1));
        if (el) el.scrollIntoView({ behavior: "smooth" });
      }
      
      function attachAyatActions(surahId, surahName, ayatAudioList) {
        document.querySelectorAll(".bookmark-ayat").forEach(btn => {
          btn.onclick = () => {
            saveBookmark(btn.dataset.surah, btn.dataset.ayat, btn.dataset.arab, btn.dataset.trans, btn.dataset.surahname);
          };
        });
        document.querySelectorAll(".play-ayat").forEach(btn => {
          btn.onclick = () => {
            const index = parseInt(btn.dataset.nomor) - 1;
            if (ayatAudioList[index] && ayatAudioList[index].audio) {
              initAudioPlayer(ayatAudioList, surahName);
              // Simulate play
              setTimeout(() => {
                if (typeof window.playAyatAtIndex === 'function') window.playAyatAtIndex(index);
                else {
                  const event = new Event('click');
                  document.getElementById("playPauseBtnDetail")?.dispatchEvent(event);
                }
              }, 100);
            } else {
              showNotification("Audio tidak tersedia untuk ayat ini");
            }
          };
        });
        document.querySelectorAll(".copy-ayat").forEach(btn => {
          btn.onclick = () => {
            const arab = btn.closest(".ayat-card")?.querySelector(".arabic")?.innerText;
            if (arab) {
              navigator.clipboard.writeText(arab);
              showNotification("📋 Teks Arab disalin");
            }
          };
        });
        document.querySelectorAll(".tafsir-ayat").forEach(btn => {
          btn.onclick = () => {
            const surah = btn.dataset.surah;
            const ayat = btn.dataset.ayat;
            const tafsir = getTafsir(surah, ayat);
            const modal = document.getElementById("tafsirModal");
            const content = document.getElementById("tafsirContent");
            content.innerHTML = `
              <p><strong>Penjelasan:</strong> ${tafsir.summary}</p>
              <p><strong>Pelajaran utama:</strong> ${tafsir.lessons.join(", ")}</p>
              <button class="btn-primary share-tafsir"><i class="fas fa-share"></i> Share Tafsir</button>
            `;
            modal.style.display = "flex";
            modal.querySelector(".share-tafsir").onclick = () => {
              if (navigator.share) navigator.share({ title: "Tafsir Ayat", text: `${tafsir.summary}\n${tafsir.lessons}` });
              else alert("Share tidak didukung browser ini");
            };
          };
        });
        // Save last read when ayat clicked
        document.querySelectorAll(".ayat-card").forEach(card => {
          card.addEventListener("click", (e) => {
            if (e.target.tagName === "BUTTON") return;
            const ayatNum = card.querySelector(".ayat-number")?.innerText.split(" ")[1];
            if (ayatNum) saveLastRead(surahId, ayatNum, surahName);
          });
        });
      }
    })();
    
    // Back to home
    document.getElementById("backHome").onclick = () => window.location.href = "index.html";
    
    // Theme toggle (from global)
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) themeToggle.onclick = () => {
      document.body.classList.toggle("light");
      localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
    };
    
    // Focus mode toggle
    let focusActive = false;
    document.getElementById("focusModeToggle").onclick = () => {
      focusActive = !focusActive;
      document.body.classList.toggle("focus-mode", focusActive);
      if (focusActive) {
        const controls = document.createElement("div");
        controls.className = "focus-controls";
        controls.innerHTML = `<button id="exitFocusBtn"><i class="fas fa-compress"></i> Keluar</button>`;
        document.body.appendChild(controls);
        document.getElementById("exitFocusBtn").onclick = () => document.getElementById("focusModeToggle").click();
      } else {
        const ctrl = document.querySelector(".focus-controls");
        if (ctrl) ctrl.remove();
      }
    };
  </script>
</body>
</html>
